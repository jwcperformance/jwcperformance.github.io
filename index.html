<style>
  :root{
    --ink:#23241D;--paper:#F6F4ED;--khaki-deep:#3D3E2F;
    --gold:#B6862A;--gold-deep:#8A6418;--line:#DDD8C7;--muted:#6A6753;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    background:var(--paper);color:var(--ink);line-height:1.55;
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    padding:24px;-webkit-font-smoothing:antialiased;
  }
  .card{max-width:480px;text-align:center;}
  .mark{
    width:18px;height:18px;background:var(--gold);
    display:inline-block;transform:rotate(45deg);margin-bottom:24px;
  }
  .eyebrow{
    font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.05em;
    color:var(--gold-deep);font-weight:600;text-transform:uppercase;margin-bottom:14px;
  }
  h1{
    font-family:'Fraunces',serif;font-size:28px;font-weight:700;
    letter-spacing:-0.01em;margin-bottom:14px;
  }
  p{color:var(--muted);font-size:15.5px;margin-bottom:28px;}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;
    padding:14px 24px;border-radius:4px;font-weight:700;font-size:14.5px;
    background:var(--gold);color:var(--khaki-deep);text-decoration:none;
  }
