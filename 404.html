<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found — JWC Performance</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#23241D;--paper:#F6F4ED;--khaki-deep:#3D3E2F;
    --gold:#B6862A;--gold-deep:#8A6418;--line:#DDD8C7;--muted:#6A6753;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    background:var(--paper);color:var(--ink);line-height:1.55;
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    padding:24px;-webkit-font-smoothing:antialiased;
  }
  .card{max-width:480px;text-align:center;}
  .code{
    font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--gold-deep);
    font-weight:600;letter-spacing:0.05em;margin-bottom:14px;
  }
  h1{
    font-family:'Fraunces',serif;font-size:28px;font-weight:700;
    letter-spacing:-0.01em;margin-bottom:14px;
  }
  p{color:var(--muted);font-size:15.5px;margin-bottom:28px;}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;
    padding:14px 24px;border-radius:4px;font-weight:700;font-size:14.5px;
    background:var(--gold);color:var(--khaki-deep);text-decoration:none;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="code">404 — not found</div>
    <h1>That page doesn't exist.</h1>
    <p>The page you're looking for may have moved, or the link might be out of date.</p>
    <a href="/" class="btn">Back to homepage</a>
  </div>
</body>
</html>
